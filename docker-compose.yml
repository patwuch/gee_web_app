services:
  app:
    build: .
    container_name: gee_manager
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${APP_PORT:-8501}:8501"
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/config/gee-key.json
      - HOME=/tmp
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    command: ["streamlit", "run", "main.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.fileWatcherType=watchdog"]
